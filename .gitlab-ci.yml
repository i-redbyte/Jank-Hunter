stages:
  - sync
  - export

default:
  image: alpine:3.22
  tags:
    - infra-docker
  before_script:
    - apk add --no-cache git curl jq
    - git config --global --add safe.directory "$CI_PROJECT_DIR"
    - git config user.name "${GIT_AUTHOR_NAME:-gitlab-ci}"
    - git config user.email "${GIT_AUTHOR_EMAIL:-gitlab-ci@example.invalid}"

variables:
  GIT_DEPTH: "0"
  GITHUB_REPOSITORY: "i-redbyte/Jank-Hunter"
  GITHUB_BASE_BRANCH: "master"
  GITHUB_EXPORT_BRANCH: "gitlab-master-sync"

sync_from_github:
  stage: sync
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - when: never
  script:
    - .gitlab/scripts/sync-from-github.sh

create_github_pull_request:
  stage: export
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_PIPELINE_SOURCE == "web" && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: manual
    - when: never
  script:
    - .gitlab/scripts/create-github-pull-request.sh
