name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  kotlin-only:
    name: Kotlin-only Android sources
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check Java sources
        run: |
          if find android -name '*.java' -print -quit | grep -q .; then
            echo "Java sources are not allowed in android modules"
            find android -name '*.java' -print
            exit 1
          fi

  go-test:
    name: Go test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: cli/go.mod
          cache-dependency-path: cli/go.mod
      - name: Test
        working-directory: cli
        run: go test ./...

  android-test-assemble:
    name: Android test and assemble
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Test and assemble
        working-directory: android
        run: ./gradlew test assemble --no-daemon --stacktrace

  publish-dry-run:
    name: Publish dry run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Publish to Maven Local
        working-directory: android
        run: ./gradlew publishToMavenLocal --no-daemon --stacktrace

  cli-report-artifact:
    name: CLI report artifact
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: cli/go.mod
          cache-dependency-path: cli/go.mod
      - name: Build release archives
        working-directory: cli
        run: make release VERSION=ci
      - name: Generate sample reports
        working-directory: cli
        run: |
          go run ./cmd/jankhunter sample --out /tmp/sample.jhlog
          go run ./cmd/jankhunter inspect /tmp/sample.jhlog --json --out /tmp/report.html > /tmp/inspect.json
          go run ./cmd/jankhunter compare --baseline /tmp/sample.jhlog --candidate /tmp/sample.jhlog --json --out /tmp/compare.html > /tmp/compare.json
      - uses: actions/upload-artifact@v4
        with:
          name: jankhunter-cli-artifacts
          path: |
            /tmp/sample.jhlog
            /tmp/report.html
            /tmp/compare.html
            /tmp/inspect.json
            /tmp/compare.json
            cli/dist/*.tar.gz
            cli/dist/checksums.txt

  report-visual-regression:
    name: Report visual regression
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: cli/go.mod
          cache-dependency-path: cli/go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: cli/package-lock.json
      - name: Install report visual dependencies
        working-directory: cli
        run: npm ci
      - name: Install Chromium
        working-directory: cli
        run: npx playwright install --with-deps chromium
      - name: Check report layout
        working-directory: cli
        run: npm run visual-regression
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jankhunter-report-visual-regression
          path: tmp/report-visual-regression
